<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Billiard Break Intro - Mobile Friendly</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* Mencegah layar geser-geser pas di-drag di HP */
            touch-action: none; 
            -webkit-user-select: none;
            user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: Arial, sans-serif;
        }
        #intro-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #0f7329 0%, #053b13 100%);
            transition: opacity 1s ease-in-out;
        }
        canvas {
            display: block;
        }
        .instruction {
            position: absolute;
            top: 12%;
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: none;
            text-align: center;
            width: 100%;
            padding: 0 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }
        .fade-out {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="intro-container">
        <div class="instruction">Geser jari untuk membidik, lepas untuk BREAK!</div>
        <canvas id="billiardCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('billiardCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('intro-container');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        const friction = 0.982; 
        let balls = [];
        let hasBroken = false;
        let isStriking = false;
        let strikeProgress = 0; 

        // Posisi Bidikan (Mendukung Mouse & Touch)
        let aimPoint = { x: 0, y: 0 };
        let isTouching = false;

        // Fungsi memperbarui koordinat bidikan
        function updateAim(clientX, clientY) {
            if (!hasBroken && !isStriking) {
                aimPoint.x = clientX;
                aimPoint.y = clientY;
                isTouching = true;
            }
        }

        // --- EVENT LISTENER UNTUK MOBILE (TOUCH) ---
        window.addEventListener('touchstart', (e) => {
            updateAim(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            updateAim(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });

        window.addEventListener('touchend', () => {
            if (isTouching && !hasBroken && !isStriking) {
                isStriking = true;
                isTouching = false;
                document.querySelector('.instruction').style.display = 'none';
            }
        });

        // --- EVENT LISTENER UNTUK DESKTOP (MOUSE fallback) ---
        window.addEventListener('mousedown', (e) => {
            updateAim(e.clientX, e.clientY);
        });
        window.addEventListener('mousemove', (e) => {
            if (isTouching) updateAim(e.clientX, e.clientY);
        });
        window.addEventListener('mouseup', () => {
            if (isTouching && !hasBroken && !isStriking) {
                isStriking = true;
                isTouching = false;
                document.querySelector('.instruction').style.display = 'none';
            }
        });

        class Ball {
            constructor(x, y, radius, color, number, isCueBall = false) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
                this.number = number;
                this.vx = 0;
                this.vy = 0;
                this.isCueBall = isCueBall;
            }

            draw() {
                // Shadow
                ctx.beginPath();
                ctx.arc(this.x + 2, this.y + 3, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.fill();

                // Glossy Ball
                ctx.beginPath();
                let gradient = ctx.createRadialGradient(
                    this.x - this.radius*0.3, this.y - this.radius*0.3, this.radius * 0.1,
                    this.x, this.y, this.radius
                );
                if (this.isCueBall) {
                    gradient.addColorStop(0, '#ffffff');
                    gradient.addColorStop(1, '#e0e0e0');
                } else {
                    gradient.addColorStop(0, '#ffffff');
                    gradient.addColorStop(0.2, this.color);
                    gradient.addColorStop(1, darkenColor(this.color, 40));
                }
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Number
                if (!this.isCueBall) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius * 0.45, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();

                    ctx.fillStyle = '#111111';
                    ctx.font = `bold ${this.radius * 0.5}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.number, this.x, this.y + 0.5);
                }
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= friction;
                this.vy *= friction;

                let border = window.innerWidth < 600 ? 25 : 45;
                if (this.x - this.radius < border) { this.x = this.radius + border; this.vx *= -0.8; }
                if (this.x + this.radius > canvas.width - border) { this.x = canvas.width - this.radius - border; this.vx *= -0.8; }
                if (this.y - this.radius < border) { this.y = this.radius + border; this.vy *= -0.8; }
                if (this.y + this.radius > canvas.height - border) { this.y = canvas.height - this.radius - border; this.vy *= -0.8; }
            }
        }

        function darkenColor(hex, percent) {
            let num = parseInt(hex.replace("#",""), 16),
            amt = Math.round(2.55 * percent),
            R = (num >> 16) - amt,
            G = (num >> 8 & 0x00FF) - amt,
            B = (num & 0x0000FF) - amt;
            return "#" + (0x1000000 + (R<0?0:R>255?255:R)*0x10000 + (G<0?0:G>255?255:G)*0x100 + (B<0?0:B>255?255:B)).toString(16).slice(1);
        }

        function initGame() {
            balls = [];
            // Ukuran bola lebih kecil di HP supaya muat layarnya
            const isMobile = window.innerWidth < 600;
            const r = isMobile ? 11 : 16; 
            const centerX = isMobile ? canvas.width * 0.25 : canvas.width * 0.3;
            const centerY = canvas.height * 0.5;

            const cueBall = new Ball(isMobile ? canvas.width * 0.75 : canvas.width * 0.75, centerY, r, '#ffffff', 0, true);
            balls.push(cueBall);

            // Set bidikan awal ke belakang bola putih
            aimPoint.x = cueBall.x + 80;
            aimPoint.y = centerY;

            const poolColors = [
                '#f1c40f', '#2980b9', '#e74c3c', '#9b59b6', '#d35400', '#27ae60', '#7f8c8d', '#111111',
                '#f39c12', '#2980b9', '#c0392b', '#8e44ad', '#e67e22', '#2ecc71', '#bdc3c7'
            ];

            let ballIndex = 0;
            let currentX = centerX;
            let rows = 5;

            for (let i = 0; i < rows; i++) {
                let currentY = centerY - (i * r);
                for (let j = 0; j <= i; j++) {
                    let num = ballIndex + 1;
                    let color = poolColors[ballIndex % poolColors.length];
                    if (i === 2 && j === 1) { num = 8; color = '#111111'; }
                    else if (num === 8) { num = 3; color = '#e74c3c'; }

                    balls.push(new Ball(currentX, currentY + (j * r * 2), r, color, num));
                    ballIndex++;
                }
                currentX += r * 1.73;
            }
        }

        function drawTableBorders() {
            let border = window.innerWidth < 600 ? 20 : 40;
            ctx.lineWidth = border;
            ctx.strokeStyle = '#5a3d28'; 
            ctx.strokeRect(border/2, border/2, canvas.width - border, canvas.height - border);
        }

        function drawCueStick(cueBall) {
            if (hasBroken && !isStriking) return;

            // Hitung arah stik berdasarkan posisi sentuhan/aimPoint
            let dx = cueBall.x - aimPoint.x;
            let dy = cueBall.y - aimPoint.y;
            let angle = Math.atan2(dy, dx);

            ctx.save();
            ctx.translate(cueBall.x, cueBall.y);
            ctx.rotate(angle);

            let baseDistance = cueBall.radius + 12;
            let offset = baseDistance + strikeProgress;
            let stickLength = window.innerWidth < 600 ? 180 : 280;

            // Stick Shadow
            ctx.beginPath();
            ctx.moveTo(-offset - 5, 4);
            ctx.lineTo(-offset - stickLength, 6);
            ctx.strokeStyle = 'rgba(0,0,0,0.25)';
            ctx.lineWidth = 4;
            ctx.stroke();

            // Stick Tip (Ivory)
            ctx.beginPath();
            ctx.moveTo(-offset, 0);
            ctx.lineTo(-offset - 15, 0);
            ctx.strokeStyle = '#f5f5f5';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Main Shaft (Wood)
            ctx.beginPath();
            ctx.moveTo(-offset - 15, 0);
            ctx.lineTo(-offset - (stickLength * 0.6), 0);
            ctx.strokeStyle = '#e3c193';
            ctx.lineWidth = 4;
            ctx.stroke();

            // Butt (Dark Wood)
            ctx.beginPath();
            ctx.moveTo(-offset - (stickLength * 0.6), 0);
            ctx.lineTo(-offset - stickLength, 0);
            ctx.strokeStyle = '#2c1d11';
            ctx.lineWidth = 6;
            ctx.stroke();

            ctx.restore();
        }

        function checkCollisions() {
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    let b1 = balls[i];
                    let b2 = balls[j];
                    let dx = b2.x - b1.x;
                    let dy = b2.y - b1.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < b1.radius + b2.radius) {
                        let angle = Math.atan2(dy, dx);
                        let sin = Math.sin(angle);
                        let cos = Math.cos(angle);

                        let x1 = 0, y1 = 0;
                        let x2 = dx * cos + dy * sin;

                        let vx1 = b1.vx * cos + b1.vy * sin;
                        let vy1 = b1.vy * cos - b1.vx * sin;
                        let vx2 = b2.vx * cos + b2.vy * sin;
                        let vy2 = b2.vy * cos - b2.vx * sin;

                        let vxTotal = vx1 - vx2;
                        vx1 = vx2;
                        vx2 = vxTotal + vx1;

                        let overlap = (b1.radius + b2.radius) - distance;
                        x1 -= (overlap / 2) * cos;
                        x2 += (overlap / 2) * cos;

                        b1.x = b1.x + x1;
                        b2.x = b2.x + (x2 - dx);

                        b1.vx = vx1 * cos - vy1 * sin;
                        b1.vy = vy1 * cos + vx1 * sin;
                        b2.vx = vx2 * cos - vy2 * sin;
                        b2.vy = vy2 * cos + vx2 * sin;
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawTableBorders();
            let cueBall = balls.find(b => b.isCueBall);

            if (isStriking) {
                if (strikeProgress < 45 && cueBall.vx === 0) {
                    strikeProgress += 5; 
                } else {
                    strikeProgress -= 30; 
                    if (strikeProgress <= 0) {
                        isStriking = false;
                        let dx = cueBall.x - aimPoint.x;
                        let dy = cueBall.y - aimPoint.y;
                        let angle = Math.atan2(dy, dx);
                        
                        // Menyesuaikan power pukulan di layar HP biar pas
                        let power = window.innerWidth < 600 ? 40 : 55;
                        cueBall.vx = Math.cos(angle) * power;
                        cueBall.vy = Math.sin(angle) * power;
                        hasBroken = true;
                    }
                }
            }

            checkCollisions();

            balls.forEach(ball => {
                ball.update();
                ball.draw();
            });

            if (cueBall && (!hasBroken || isStriking)) {
                drawCueStick(cueBall);
            }

            if (hasBroken && !isStriking) {
                let totalSpeed = balls.reduce((sum, b) => sum + Math.sqrt(b.vx**2 + b.vy**2), 0);
                if (totalSpeed < 0.8) {
                    hasBroken = false;
                    setTimeout(() => {
                        container.classList.add('fade-out');
                        setTimeout(() => {
                            window.location.href = "main.html"; 
                        }, 1000);
                    }, 400);
                }
            }

            requestAnimationFrame(animate);
        }

        initGame();
        animate();

        window.addEventListener('resize', () => {
            resizeCanvas();
            initGame();
        });
    </script>
</body>
</html>
